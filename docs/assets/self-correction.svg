<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="720" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
  </defs>
  <rect width="720" height="280" rx="8" fill="url(#bg)"/>
  <text x="360" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">Self-Correction Engine</text>

  <!-- Agent runs -->
  <rect x="30" y="50" width="120" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#93c5fd">Agent Executes</text>
  <line x1="150" y1="70" x2="185" y2="70" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Analyze results -->
  <rect x="190" y="50" width="140" height="40" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="260" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#c4b5fd">Analyze Responses</text>
  <line x1="330" y1="70" x2="365" y2="70" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Decision diamond -->
  <polygon points="420,45 475,70 420,95 365,70" fill="#78350f" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="73" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fcd34d">Anomaly?</text>

  <!-- No anomaly → findings -->
  <line x1="475" y1="70" x2="530" y2="70" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="500" y="63" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#22c55e">clean</text>
  <rect x="535" y="50" width="150" height="40" rx="6" fill="#22c55e20" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#86efac">Create Findings</text>

  <!-- Anomaly detected → correction patterns -->
  <line x1="420" y1="95" x2="420" y2="120" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="445" y="112" font-family="ui-monospace, monospace" font-size="8" fill="#ef4444">detected</text>

  <!-- Pattern boxes -->
  <rect x="30" y="130" width="125" height="48" rx="5" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="92" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#fca5a5">Custom 404</text>
  <text x="92" y="163" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#64748b">&gt;80% same size</text>
  <text x="92" y="173" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#22c55e">&#x2192; re-run -fs {size}</text>

  <rect x="170" y="130" width="125" height="48" rx="5" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="232" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#fca5a5">WAF Blocking</text>
  <text x="232" y="163" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#64748b">&gt;95% are 403</text>
  <text x="232" y="173" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#22c55e">&#x2192; slow + rotate UA</text>

  <rect x="310" y="130" width="125" height="48" rx="5" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="372" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#fca5a5">Rate Limiting</text>
  <text x="372" y="163" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#64748b">&gt;20% are 429</text>
  <text x="372" y="173" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#22c55e">&#x2192; 1 thread + 5s delay</text>

  <rect x="450" y="130" width="125" height="48" rx="5" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="512" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#fca5a5">Redirect Loop</text>
  <text x="512" y="163" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#64748b">&gt;90% same redirect</text>
  <text x="512" y="173" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#22c55e">&#x2192; filter redirect URL</text>

  <rect x="590" y="130" width="110" height="48" rx="5" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="645" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#fca5a5">Info Flood</text>
  <text x="645" y="163" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#64748b">&gt;90% info severity</text>
  <text x="645" y="173" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#22c55e">&#x2192; medium+ filter</text>

  <!-- Retry arrow -->
  <rect x="270" y="210" width="180" height="36" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="233" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#93c5fd">Apply Fix + Re-execute</text>
  <path d="M 360 246 Q 360 265 90 265 Q 20 265 20 70 Q 20 50 30 50" stroke="#3b82f6" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="180" y="258" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#3b82f6">&#x21BB; retry with corrected params</text>
</svg>
